# Chitra capability manifest (HFR: human-facing resource).
# Read this as a declarative, narrow authority document: an enabled entry
# grants only its listed command surface and never a general shell privilege.
schema: chitra.capabilities.v1
capabilities:
  - name: dispatchd
    kind: daemon
    purpose: Drain the deterministic local dispatch order queue into tmux lanes.
    when_to_use: Run as the supervised queue-delivery daemon after an external caller has written a valid order.
    authority:
      level: record
      grants:
        - Consume validated local dispatch orders and record their results.
      excludes:
        - Decide message content.
        - Merge, approve, or modify pull requests.
    default_enabled: true
    commands:
      - name: dispatchd
        description: Start the local deterministic dispatch daemon.
        argv: [dispatchd]
        params: []
        mutates: true

  - name: triaged
    kind: daemon
    purpose: Tail lane events and emit deterministic state-transition records.
    when_to_use: Run as the supervised event-triage daemon for an existing events log.
    authority:
      level: record
      grants:
        - Read lane events and write deduplicated local triage records.
      excludes:
        - Dispatch messages.
        - Merge, approve, or modify pull requests.
    default_enabled: true
    commands:
      - name: triaged
        description: Start the local deterministic triage daemon.
        argv: [triaged]
        params: []
        mutates: true

  - name: sweepd
    kind: daemon
    purpose: Produce a compact delta digest from already-digested fleet state.
    when_to_use: Run as the supervised sensing daemon so the foreground monitor can consume one small digest per sweep.
    authority:
      level: record
      grants:
        - Read compact Chitra state stores and write a delta digest plus its local baseline.
      excludes:
        - Read conversation transcripts or invoke an LLM.
        - Dispatch messages, merge, approve, or modify pull requests.
    default_enabled: true
    commands:
      - name: chitra-sweepd
        description: Start the deterministic fleet-state digest daemon.
        argv: [chitra-sweepd]
        params: []
        mutates: true

  - name: draft-scanner
    kind: daemon
    purpose: Detect unsubmitted drafts in configured tmux input boxes.
    when_to_use: Run periodically when an operator wants flag-only visibility into lingering drafts.
    authority:
      level: observe
      grants:
        - Inspect configured tmux panes and report draft presence.
      excludes:
        - Submit, discard, or edit a draft.
        - Merge, approve, or modify pull requests.
    default_enabled: true
    commands:
      - name: draft-scanner
        description: Start the flag-only draft scanner daemon.
        argv: [draft-scanner]
        params: []
        mutates: false

  - name: board
    kind: tool
    purpose: Render the deterministic operator board from validated state facts.
    when_to_use: Use when an operator needs a current, local status board rather than a free-text summary.
    authority:
      level: observe
      grants:
        - Read validated board facts and render a local view.
      excludes:
        - Decide work priorities.
        - Merge, approve, or modify pull requests.
    default_enabled: true
    commands:
      - name: chitra-board
        description: Render the local chitra board.
        argv: [chitra-board]
        params: []
        mutates: false

  - name: usage
    kind: tool
    purpose: Read provider usage snapshots and evaluate deterministic thresholds.
    when_to_use: Use before scheduling work when rate-limit state may constrain a lane or account.
    authority:
      level: observe
      grants:
        - Read usage snapshots and calculate a threshold verdict.
      excludes:
        - Pause, resume, or dispatch to a lane.
        - Change provider account settings.
    default_enabled: true
    commands:
      - name: chitra-usage
        description: Read usage snapshots or print their deterministic evaluation.
        argv: [chitra-usage]
        params: []
        mutates: false

  - name: goals
    kind: tool
    purpose: Record the monitor-stated goal and explicit status for a lane.
    when_to_use: Use when a stated lane goal, hold, or open operator ask must survive a monitor restart.
    authority:
      level: record
      grants:
        - Store and retrieve deterministic per-lane goal records.
      excludes:
        - Generate goals or decide whether work is complete.
        - Merge, approve, or modify pull requests.
    default_enabled: true
    commands:
      - name: chitra-goals
        description: Store, inspect, or render deterministic lane goal records.
        argv: [chitra-goals]
        params: []
        mutates: true

  - name: artifacts
    kind: tool
    purpose: Record Claude artifact publication and explicit review metadata.
    when_to_use: Use when an artifact URL and its review state need durable, deterministic bookkeeping.
    authority:
      level: record
      grants:
        - Store artifact metadata and explicit review state.
      excludes:
        - Publish an artifact.
        - Decide review content or merge pull requests.
    default_enabled: true
    commands:
      - name: chitra-artifacts
        description: Store and inspect deterministic artifact review records.
        argv: [chitra-artifacts]
        params: []
        mutates: true

  - name: convo
    kind: tool
    purpose: Record structured operator and lane conversation facts.
    when_to_use: Use when a monitor must preserve a decision, directive, or operator brief verbatim.
    authority:
      level: record
      grants:
        - Append and render structured local conversation records.
      excludes:
        - Invent conversation content.
        - Dispatch messages or modify pull requests.
    default_enabled: true
    commands:
      - name: chitra-convo
        description: Record and inspect structured conversation facts.
        argv: [chitra-convo]
        params: []
        mutates: true

  - name: capability-management
    kind: tool
    purpose: Inspect and reversibly record per-capability runtime toggles.
    when_to_use: Use when an operator needs to inspect, time-box, enable, disable, or reset one declared tool capability.
    authority:
      level: record
      grants:
        - Record only per-capability enablement overrides in the local state directory.
      excludes:
        - Enable a daemon.
        - Grant global shell, git, GitHub, merge, or approval authority.
    default_enabled: true
    commands:
      - name: chitra-capabilities
        description: Inspect or record one reversible capability toggle.
        argv: [chitra-capabilities]
        params: []
        mutates: true

  - name: rate-limit-guard
    kind: tool
    purpose: >-
      Drive a durable pause/resume transaction machine for a session nearing its provider
      rate/session limit: checkpoint it, confirm the turn actually stopped, hold it, then
      resume it once the window resets and dispatchd has redelivered its deferred backlog.
    when_to_use: Run under an external timer (systemd timer / cron), one host at a time, against that host's chitra-usage snapshot directory.
    authority:
      level: act
      grants:
        - Hold or resume a chitra goal record for a rate-limit reason, preserving its stored goal as the re-arm payload.
        - Gracefully shed and progressively resume tracked lanes in response to persisted host-memory pressure levels.
        - Enqueue a fixed checkpoint, stop-clear, or goal-templated resume nudge onto the local dispatch order queue.
        - Requeue a held session's deferred backlog (FIFO, exactly once) after a confirmed resume.
        - Answer a read-only ownership query for supplied session references without acting on the lanes.
      excludes:
        - Author, judge, or vary nudge content -- every nudge is a fixed/templated literal, never LLM-generated.
        - Override an operator- or throttle-held lane, or resume into a still-hot window.
        - Touch a tmux pane directly -- delivery is the existing dispatchd queue's job.
        - Fan out a Codex account-wide pause to per-lane sessions -- Codex has no per-lane usage snapshot yet (tracked gap, not implemented; see rate_limit_guard.py docstring).
    default_enabled: true
    commands:
      - name: chitra-rate-limit-guard
        description: Advance one detect/checkpoint/stop-verify/hold/resume sweep pass for one host's tracked sessions.
        argv: [chitra-rate-limit-guard]
        params: []
        mutates: true
      - name: chitra-ownership
        description: Report whether supplied session references belong to tracked working lanes on one host.
        argv: [chitra-ownership]
        params: []
        mutates: false
