name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[test]'
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy src/chitra
      - name: Test
        run: pytest --cov=chitra --cov-report=term-missing
