name: Publish to PyPI

# Fires ONLY when a maintainer manually publishes a GitHub Release — never on
# push or tag-create. Cutting the Release is the human gate; nothing here
# runs unattended before that.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/chitra-monitor/
    permissions:
      # Required for OIDC trusted publishing (no API token stored in the repo).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # v1.11+ requests PEP 740 attestations by default when publishing via
      # trusted publishing (OIDC) — no extra config needed, just don't pin an
      # older release that predates attestation support.
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          print-hash: true
